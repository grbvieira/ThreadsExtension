<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <style>
        /* --- GENERAL STYLES --- */
        body {
            width: 300px;
            padding: 20px;
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #101010; /* Threads dark background */
            color: #ffffff;
            box-sizing: border-box;
        }

        /* Header with icon and title */
        .header {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 25px;
        }
        
        /* Simulated Threads icon with CSS */
        .threads-icon {
            width: 24px; height: 24px;
            background: linear-gradient(45deg, #feda75, #fa7e1e, #d62976, #962fbf, #4f5bd5);
            border-radius: 8px; margin-right: 10px;
            display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 14px;
        }

        h3 {
            margin: 0;
            font-weight: 600;
            font-size: 18px;
            letter-spacing: 0.5px;
        }

        /* --- PRIMARY BUTTON --- */
        .btn-container { text-align: center; }
        
        button#btnDownload {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            /* Threads-style gradient */
            background: linear-gradient(to right, #ff5858, #c058ff); 
            color: white;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.2s;
            box-shadow: 0 4px 15px rgba(192, 88, 255, 0.3);
        }

        button#btnDownload:hover { opacity: 0.9; }
        button#btnDownload:active { transform: scale(0.98); }
        button#btnDownload:disabled {
            background: #333; color: #777; cursor: not-allowed; box-shadow: none;
        }

        /* --- PROGRESS AREA --- */
        .progress-container {
            margin-top: 25px;
            display: none; /* Hidden initially */
            background: #1c1c1c;
            padding: 15px;
            border-radius: 12px;
        }

        .info-row {
            display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 10px;
        }
        
        .status-label { font-size: 12px; color: #aaa; font-weight: 500; }
        .status-text { font-size: 13px; color: #ddd; font-weight: 500; text-align: right; }
        
        .counter-wrapper { text-align: center; margin-bottom: 15px; }
        .counter { font-size: 32px; font-weight: 800; background: linear-gradient(to right, #ff5858, #c058ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .counter-label { font-size: 12px; color: #777; text-transform: uppercase; letter-spacing: 1px; }

        /* Progress bar */
        .progress-track {
            width: 100%; height: 8px; background: #333; border-radius: 4px; overflow: hidden; position: relative;
        }
        
        .progress-fill {
            height: 100%; width: 30%;
            background: linear-gradient(to right, #ff5858, #c058ff);
            border-radius: 4px;
            position: absolute; left: -30%;
            /* Loading animation */
            animation: loading 1.5s infinite cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes loading {
            0% { left: -30%; width: 30%; opacity: 0.7; }
            50% { left: 25%; width: 50%; opacity: 1; }
            100% { left: 100%; width: 30%; opacity: 0.7; }
        }

        /* Error and success message helpers */
        .error-msg { color: #ff4444 !important; font-weight: bold; }
        .success-msg { color: #00C853 !important; font-weight: bold; }
    </style>
</head>
<body>
    <div class="header">
        <div class="threads-icon">@</div>
        <h3>Threads Pro Downloader</h3>
    </div>
    
    <div class="btn-container">
        <button id="btnDownload">INICIAR DOWNLOAD</button>
    </div>
    
    <div id="progressArea" class="progress-container">
        <div class="counter-wrapper">
            <div class="counter" id="countDisplay">0</div>
            <div class="counter-label">Mídias Salvas</div>
        </div>
        
        <div class="progress-track">
            <div class="progress-fill"></div>
        </div>
    
        <div class="info-row" style="margin-top: 12px;">
            <span class="status-label">Status:</span>
            <span class="status-text" id="statusText">Aguardando.</span>
        </div>
    
        <div class="btn-container" style="margin-top: 14px; display: flex; gap: 10px;">
            <button id="btnPause" style="flex:1; background:#444;">PAUSAR</button>
            <button id="btnCancel" style="flex:1; background:#7a1f1f;">CANCELAR</button>
        </div>
    </div>

    <script src="popup.js"></script>
</body>
</html>

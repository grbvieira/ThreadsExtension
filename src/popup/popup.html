<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <style>
        body {
            width: 300px;
            padding: 20px;
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #101010;
            color: #ffffff;
            box-sizing: border-box;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 25px;
        }

        .threads-icon {
            width: 24px;
            height: 24px;
            background: linear-gradient(45deg, #feda75, #fa7e1e, #d62976, #962fbf, #4f5bd5);
            border-radius: 8px;
            margin-right: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 14px;
        }

        h3 {
            margin: 0;
            font-weight: 600;
            font-size: 18px;
            letter-spacing: 0.5px;
        }

        .btn-container {
            text-align: center;
        }

        button#btnDownload {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(to right, #ff5858, #c058ff);
            color: white;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.2s;
            box-shadow: 0 4px 15px rgba(192, 88, 255, 0.3);
        }

        button#btnDownload:hover {
            opacity: 0.9;
        }

        button#btnDownload:active {
            transform: scale(0.98);
        }

        button#btnDownload:disabled {
            background: #333;
            color: #777;
            cursor: not-allowed;
            box-shadow: none;
        }

        .folder-panel,
        .media-filter,
        .progress-container {
            background: #1c1c1c;
            padding: 12px;
            border-radius: 12px;
        }

        .folder-panel,
        .media-filter {
            margin-bottom: 16px;
        }

        .folder-title {
            font-size: 12px;
            color: #aaa;
            font-weight: 600;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .folder-name {
            color: #fff;
            font-size: 13px;
            line-height: 1.3;
            word-break: break-word;
            margin-bottom: 10px;
        }

        .secondary-actions {
            display: flex;
            gap: 8px;
        }

        .secondary-actions button,
        #btnPause,
        #btnCancel {
            border: none;
            border-radius: 8px;
            color: #fff;
            cursor: pointer;
            font-size: 12px;
            font-weight: 700;
            padding: 10px;
        }

        .secondary-actions button {
            flex: 1;
            background: #333;
        }

        .secondary-actions button:disabled,
        #btnPause:disabled,
        #btnCancel:disabled {
            color: #777;
            cursor: not-allowed;
        }

        .media-options {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 6px;
        }

        .media-options label {
            display: block;
        }

        .media-options input {
            position: absolute;
            opacity: 0;
            pointer-events: none;
        }

        .media-options span {
            display: block;
            padding: 9px 6px;
            border-radius: 8px;
            background: #333;
            color: #ddd;
            cursor: pointer;
            font-size: 12px;
            font-weight: 700;
            text-align: center;
        }

        .media-options input:checked + span {
            background: linear-gradient(to right, #ff5858, #c058ff);
            color: #fff;
        }

        .media-options input:focus-visible + span {
            outline: 2px solid #fff;
            outline-offset: 2px;
        }

        .progress-container {
            margin-top: 25px;
            display: none;
            padding: 15px;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            gap: 10px;
            margin-bottom: 10px;
        }

        .status-label {
            font-size: 12px;
            color: #aaa;
            font-weight: 500;
        }

        .status-text {
            font-size: 13px;
            color: #ddd;
            font-weight: 500;
            text-align: right;
        }

        .counter-wrapper {
            text-align: center;
            margin-bottom: 15px;
        }

        .counter {
            font-size: 32px;
            font-weight: 800;
            background: linear-gradient(to right, #ff5858, #c058ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .counter-label {
            font-size: 12px;
            color: #777;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .progress-track {
            width: 100%;
            height: 8px;
            background: #333;
            border-radius: 4px;
            overflow: hidden;
            position: relative;
        }

        .progress-fill {
            height: 100%;
            width: 30%;
            background: linear-gradient(to right, #ff5858, #c058ff);
            border-radius: 4px;
            position: absolute;
            left: -30%;
            animation: loading 1.5s infinite cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes loading {
            0% { left: -30%; width: 30%; opacity: 0.7; }
            50% { left: 25%; width: 50%; opacity: 1; }
            100% { left: 100%; width: 30%; opacity: 0.7; }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="threads-icon">@</div>
        <h3>Threads Pro Downloader</h3>
    </div>

    <div class="folder-panel">
        <div class="folder-title">Pasta de destino</div>
        <div class="folder-name" id="folderName">Nenhuma pasta selecionada</div>
        <div class="secondary-actions">
            <button id="btnChooseFolder">ESCOLHER</button>
            <button id="btnForgetFolder" disabled>ESQUECER</button>
        </div>
    </div>

    <div class="media-filter">
        <div class="folder-title">Tipo de mídia</div>
        <div class="media-options">
            <label>
                <input type="radio" name="mediaType" value="all" checked>
                <span>TUDO</span>
            </label>
            <label>
                <input type="radio" name="mediaType" value="images">
                <span>IMAGENS</span>
            </label>
            <label>
                <input type="radio" name="mediaType" value="videos">
                <span>VÍDEOS</span>
            </label>
        </div>
    </div>

    <div class="btn-container">
        <button id="btnDownload">INICIAR DOWNLOAD</button>
    </div>

    <div id="progressArea" class="progress-container">
        <div class="counter-wrapper">
            <div class="counter" id="countDisplay">0</div>
            <div class="counter-label">Mídias Salvas</div>
        </div>

        <div class="progress-track">
            <div class="progress-fill"></div>
        </div>

        <div class="info-row" style="margin-top: 12px;">
            <span class="status-label">Status:</span>
            <span class="status-text" id="statusText">Aguardando.</span>
        </div>

        <div class="btn-container" style="margin-top: 14px; display: flex; gap: 10px;">
            <button id="btnPause" style="flex:1; background:#444;">PAUSAR</button>
            <button id="btnCancel" style="flex:1; background:#7a1f1f;">CANCELAR</button>
        </div>
    </div>

    <script src="../shared/shared.js"></script>
    <script src="popup.js"></script>
</body>
</html>
